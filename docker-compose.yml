services:
  app:
    build: .
    container_name: labhubuniceplac_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./uploads:/var/www/html/uploads:z
    env_file:
      - .env
    command: >
      bash -c "mkdir -p /var/www/html/uploads && chmod 777 /var/www/html/uploads && apache2-foreground"

  mysql:
    image: mariadb:10.11
    container_name: labhubuniceplac_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_labs
      MYSQL_USER: labs
      MYSQL_PASSWORD: labs123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  phpmyadmin:
      image: phpmyadmin:latest
      container_name: labhubuniceplac_phpmyadmin
      restart: unless-stopped
      depends_on:
        - mysql
      ports:
        - "8081:80"
      environment:
        PMA_HOST: mysql
        MYSQL_ROOT_PASSWORD: root

volumes:
  mysql_data: