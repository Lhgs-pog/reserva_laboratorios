<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — LabHub UNICEPLAC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --azul: #00734F; --laranja: #f07f3c; }
    body { background: #f0f2f5; }
    .card { border-top: 6px solid var(--laranja); border-radius: 12px; }
    .btn-uniceplac { background: var(--azul); color: #fff; border: none; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg p-4" style="width:28rem">
    <h5 class="text-center mb-3" style="color:#00734F">Solicitar Cadastro</h5>
    <form onsubmit="event.preventDefault(); alert('Cadastro enviado! (demonstração)'); location.href='index.html';">
      <div class="mb-3"><label class="form-label small fw-bold">Nome completo</label><input class="form-control" value="Novo Professor" readonly></div>
      <div class="mb-3"><label class="form-label small fw-bold">E-mail institucional</label><input class="form-control" value="novo@uniceplac.edu.br" readonly></div>
      <div class="mb-3"><label class="form-label small fw-bold">Perfil</label><select class="form-select"><option>Professor</option></select></div>
      <button class="btn btn-uniceplac w-100">Enviar solicitação</button>
      <a href="index.html" class="d-block text-center mt-3 small">Voltar ao login</a>
    </form>
  </div>
</body>
</html>
