<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNICEPLAC - Central de Reservas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --azul-uniceplac: #00734F; --amarelo-uniceplac: #f07f3c; }
    body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .text-uniceplac { color: var(--azul-uniceplac) !important; }
    .btn-uniceplac { background-color: var(--azul-uniceplac); color: white; font-weight: 600; border: none; }
    .btn-uniceplac:hover { background-color: #045238; color: var(--amarelo-uniceplac); }
    .card-uniceplac { border: none; border-top: 6px solid var(--amarelo-uniceplac); border-radius: 12px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff; color: #444; border: 1px solid #dadce0; font-weight: 500;
      border-radius: 6px; text-decoration: none; padding: 0.5rem;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 1px 3px rgba(60,64,67,.3); color: #222; }
    .divider { display: flex; align-items: center; margin: 25px 0; color: #888; font-size: 0.85em; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
    .divider::before { margin-right: 1em; }
    .divider::after { margin-left: 1em; }
    .demo-badge {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      background: var(--amarelo-uniceplac); color: #fff; font-size: 0.75rem;
      padding: 6px 14px; border-radius: 20px; font-weight: 600;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
  <span class="demo-badge"><i class="bi bi-play-circle me-1"></i>Demonstração online</span>
  <div class="container d-flex justify-content-center">
    <div class="card card-uniceplac shadow-lg" style="width: 28rem;">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <img src="uniceplac2.png" alt="Logo UNICEPLAC" style="max-height: 100px;" class="mb-3">
          <h6 class="text-uniceplac fw-bold">CENTRAL DE RESERVAS ACADÊMICAS</h6>
          <p class="small text-muted mb-0">LabHub UNICEPLAC — Sistema de reserva de laboratórios</p>
        </div>

        <a href="professor.html" class="btn btn-google w-100 py-2 mb-2">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Entrar com e-mail institucional
        </a>

        <div class="divider">OU</div>

        <form action="professor.html" method="get">
          <div class="mb-3">
            <label class="form-label small fw-bold text-uniceplac">E-mail</label>
            <input type="email" class="form-control" value="professor@uniceplac.edu.br" readonly>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-bold text-uniceplac">Senha</label>
            <input type="password" class="form-control" value="demo" readonly>
          </div>
          <button type="submit" class="btn btn-uniceplac w-100 py-2">Acessar Sistema</button>
          <div class="text-center mt-4 pt-2">
            <p class="mb-1 text-muted small">Ainda não possui acesso?</p>
            <a href="cadastro.html" class="text-decoration-none fw-bold small" style="color: var(--amarelo-uniceplac);">Solicitar Cadastro</a>
          </div>
        </form>

        <div class="mt-4 p-3 bg-light rounded small">
          <strong class="text-uniceplac">Perfis para demonstração:</strong>
          <div class="d-flex flex-wrap gap-2 mt-2">
            <a href="professor.html" class="btn btn-sm btn-outline-success">Professor</a>
            <a href="coordenador.html" class="btn btn-sm btn-outline-success">Coordenador</a>
            <a href="suporte.html" class="btn btn-sm btn-outline-success">Suporte</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
